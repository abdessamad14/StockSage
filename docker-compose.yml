version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: igoodar-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: igoodar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Node.js Backend and Frontend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: igoodar-app
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/igoodar
      - SESSION_SECRET=change_this_to_a_secure_random_string_in_production
    restart: unless-stopped

volumes:
  postgres_data: